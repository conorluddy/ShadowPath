<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ShadowPath</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workbench" aria-label="ShadowPath SVG tracer">
        <header class="topbar">
          <div>
            <h1>ShadowPath</h1>
            <p>Convert high-contrast PNGs into clean SVG paths.</p>
          </div>
          <div class="actions">
            <button class="icon-button" id="copyButton" type="button" title="Copy SVG" aria-label="Copy SVG" disabled>
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <rect x="8" y="8" width="11" height="11" rx="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
            <button class="primary-button" id="downloadButton" type="button" disabled>
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 3v12"></path>
                <path d="m7 10 5 5 5-5"></path>
                <path d="M5 21h14"></path>
              </svg>
              Download SVG
            </button>
          </div>
        </header>

        <div class="workspace">
          <aside class="controls" aria-label="Tracing controls">
            <label class="dropzone" id="dropzone">
              <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <path d="m17 8-5-5-5 5"></path>
                <path d="M12 3v12"></path>
              </svg>
              <span id="fileLabel">Drop image or browse</span>
            </label>

            <div class="control-group">
              <label for="threshold">Threshold <output id="thresholdValue" for="threshold">150</output></label>
              <input id="threshold" type="range" min="0" max="255" value="150">
            </div>

            <div class="control-group">
              <label for="simplify">Simplify <output id="simplifyValue" for="simplify">1.0</output></label>
              <input id="simplify" type="range" min="0" max="8" value="1" step="0.25">
            </div>

            <div class="control-group">
              <label for="smooth">Smooth <output id="smoothValue" for="smooth">1</output></label>
              <input id="smooth" type="range" min="0" max="3" value="1" step="1">
            </div>

            <fieldset class="toggle-list">
              <legend>Shape</legend>
              <label>
                <input id="invert" type="checkbox">
                <span>Trace light areas</span>
              </label>
              <label>
                <input id="transparentBg" type="checkbox" checked>
                <span>Ignore transparent pixels</span>
              </label>
            </fieldset>

            <div class="stats" id="stats" aria-live="polite">
              <span>No image loaded</span>
            </div>
          </aside>

          <section class="preview-panel" aria-label="Preview">
            <div class="preview-grid">
              <div class="preview-frame">
                <canvas id="sourceCanvas" aria-label="Original image preview"></canvas>
                <span class="preview-label">Source</span>
              </div>
              <div class="preview-frame svg-frame" id="svgPreview" aria-label="SVG preview">
                <span class="empty-state">SVG preview</span>
                <span class="preview-label">Vector</span>
              </div>
            </div>
            <label class="code-panel">
              <span>SVG Markup</span>
              <textarea id="svgOutput" spellcheck="false" readonly></textarea>
            </label>
          </section>
        </div>
      </section>
    </main>

    <script src="tracer.js"></script>
  </body>
</html>
